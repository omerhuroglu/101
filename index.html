<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omer Huroglu</title>
  <meta name="theme-color" content="#000000" />

  <meta name="description" content="OmerHuroglu.com" />
  <meta name="author" content="Omer Huroglu" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Omer Huroglu" />
  <meta property="og:description" content="OmerHuroglu.com" />
  <meta property="og:url" content="https://omerhuroglu.com/" />
  <meta property="og:site_name" content="Omer Huroglu" />
  <meta property="og:image" content="https://omerhuroglu.com/omer-huroglu-ogimage.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Omer Huroglu" />

  <link rel="canonical" href="https://omerhuroglu.com/" />
  <link rel="icon" type="image/x-icon" href="omer-huroglu-favicon.ico" />

  <style>
    :root {
      --background-color: #000;
      --foreground-color: #fff;
      --glow-color: #00ccff;
      --page-spacing: 20px;
      --menu-transition-duration: 0.5s;
      --bloom-duration: 3s;
      --primary-font: Helvetica, Arial, sans-serif;
      --monospace-font: "Courier New", Courier, monospace;
    }

    html,
    body {
      margin: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: var(--primary-font);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      background: var(--background-color);
      color: var(--foreground-color);
    }

    main,
    #typewriter,
    #contact-widget,
    footer {
      z-index: 1;
    }

    .visually-hidden {
      position: absolute;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      white-space: nowrap;
      border: 0;
    }

    #typewriter {
      position: fixed;
      top: var(--page-spacing);
      right: var(--page-spacing);
      left: var(--page-spacing);
      font-family: var(--monospace-font);
      font-size: 30px;
      text-shadow:
        0 0 10px var(--glow-color),
        0 0 20px var(--glow-color),
        0 0 30px var(--glow-color);
    }

    .cursor {
      animation: blink 1s infinite;
    }

    #contact-widget {
      position: fixed;
      top: 50%;
      right: var(--page-spacing);
      display: flex;
      align-items: center;
      gap: 20px;
      transform: translateY(-50%);
    }

    #contact-menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: right;
      visibility: hidden;
      opacity: 0;
      transform: translateX(20px);
      transition:
        opacity var(--menu-transition-duration) ease,
        transform var(--menu-transition-duration) ease,
        visibility var(--menu-transition-duration) ease;
    }

    #contact-menu.is-open {
      visibility: visible;
      opacity: 1;
      transform: translateX(0);
    }

    #contact-menu a {
      font-size: 15px;
      text-decoration: none;
      color: var(--foreground-color);
    }

    #contact-menu a:hover {
      text-decoration: underline;
    }

    #contact-menu a:focus-visible,
    #contact-button:focus-visible {
      outline: 1px solid var(--foreground-color);
      outline-offset: 5px;
    }

    #contact-button {
      padding: 0;
      font: inherit;
      font-size: 30px;
      background: none;
      color: var(--foreground-color);
      border: 0;
      cursor: pointer;
      transition: transform var(--menu-transition-duration) ease;
    }

    #contact-button.is-open {
      transform: rotate(135deg);
    }

    footer {
      position: fixed;
      right: var(--page-spacing);
      bottom: var(--page-spacing);
      left: var(--page-spacing);
      font-size: 12.5px;
      text-align: center;
      white-space: nowrap;
    }

    .click-flash {
      position: fixed;
      z-index: 0;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(153, 0, 204, 0.10) 0%,
        rgba(0, 0, 204, 0.05) 40%,
        transparent 80%
      );
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      animation: clickBloom var(--bloom-duration) ease-out forwards;
    }

    @keyframes blink {
      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0;
      }
    }

    @keyframes clickBloom {
      0%, 100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }
      20%, 60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor,
      .click-flash {
        animation: none;
      }

      #contact-menu,
      #contact-button {
        transition: none;
      }
    }
  </style>

  <noscript>
    <style>
      #contact-menu {
        opacity: 1;
        visibility: visible;
        transform: none;
        transition: none;
      }

      #contact-button {
        display: none;
      }
    </style>
  </noscript>
</head>
<body>
  <main>
    <h1 class="visually-hidden">Omer Huroglu</h1>
    <div id="typewriter" aria-hidden="true"></div>
    <p id="typewriter-accessible" class="visually-hidden" aria-live="polite"></p>
  </main>

  <div id="contact-widget">
    <nav id="contact-menu" aria-label="Social links">
      <a href="https://www.linkedin.com/in/omerhuroglu" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://www.facebook.com/omerhuroglu0" target="_blank" rel="noopener noreferrer">Facebook</a>
      <a href="https://www.instagram.com/omerhuroglu" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://x.com/omerhuroglu" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://github.com/omerhuroglu" target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>

    <button
      id="contact-button"
      type="button"
      aria-label="Open contact links"
      aria-controls="contact-menu"
      aria-expanded="false"
    >
      +
    </button>
  </div>

  <footer>
    © <span id="year"></span> Omer Huroglu. All rights reserved.<br />
    United States
  </footer>

  <script type="module">
    const MESSAGES = [
      "Hello!",
      "Thank you for visiting OmerHuroglu.com.",
      "You can reach out via the menu.",
    ];
    const CURSOR_MARKUP = '<span class="cursor">|</span>';
    const TYPE_DELAY = 100;
    const DELETE_DELAY = 50;
    const MESSAGE_PAUSE = 3000;
    const HOLD_BLOOM_DELAY = 100;
    const MOVEMENT_STOP_DELAY = 100;

    const typewriterElement = document.getElementById("typewriter");
    const typewriterAccessibleElement = document.getElementById("typewriter-accessible");
    const contactButton = document.getElementById("contact-button");
    const contactMenu = document.getElementById("contact-menu");
    const yearElement = document.getElementById("year");

    let messageIndex = 0;
    let characterIndex = 0;
    let isDeleting = false;
    let isPressing = false;
    let holdBloomInterval = null;
    let movementStopTimeout = null;
    let pointerX = 0;
    let pointerY = 0;

    function updateTypewriter() {
      const currentMessage = MESSAGES[messageIndex];

      if (isDeleting) {
        characterIndex--;
      } else {
        characterIndex++;
      }

      typewriterElement.innerHTML = currentMessage.slice(0, characterIndex) + CURSOR_MARKUP;

      if (!isDeleting && characterIndex === currentMessage.length) {
        isDeleting = true;
        setTimeout(updateTypewriter, MESSAGE_PAUSE);
        return;
      }

      if (isDeleting && characterIndex === 0) {
        isDeleting = false;
        messageIndex = (messageIndex + 1) % MESSAGES.length;
        typewriterAccessibleElement.textContent = MESSAGES[messageIndex];
        setTimeout(updateTypewriter, MESSAGE_PAUSE);
        return;
      }

      setTimeout(updateTypewriter, isDeleting ? DELETE_DELAY : TYPE_DELAY);
    }

    function setContactMenuState(isOpen) {
      contactMenu.classList.toggle("is-open", isOpen);
      contactButton.classList.toggle("is-open", isOpen);
      contactButton.setAttribute("aria-expanded", `${isOpen}`);
      contactButton.setAttribute(
        "aria-label",
        isOpen ? "Close contact links" : "Open contact links"
      );
    }

    function toggleContactMenu() {
      setContactMenuState(!contactMenu.classList.contains("is-open"));
    }

    function closeContactMenu() {
      setContactMenuState(false);
    }

    function createBloom(x, y) {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }

      const bloomElement = document.createElement("div");

      bloomElement.classList.add("click-flash");
      bloomElement.style.left = `${x}px`;
      bloomElement.style.top = `${y}px`;
      bloomElement.addEventListener("animationend", () => bloomElement.remove(), {
        once: true,
      });

      document.body.appendChild(bloomElement);
    }

    function isPointerEffectExcluded(event) {
      return Boolean(event.target.closest("#contact-widget"));
    }

    function handleContactButtonClick() {
      toggleContactMenu();
    }

    function handleDocumentKeyDown(event) {
      if (event.key !== "Escape" || !contactMenu.classList.contains("is-open")) {
        return;
      }

      closeContactMenu();
      contactButton.focus();
    }

    function startHoldBloom() {
      clearInterval(holdBloomInterval);

      holdBloomInterval = setInterval(() => {
        if (isPressing) {
          createBloom(pointerX, pointerY);
        }
      }, HOLD_BLOOM_DELAY);
    }

    function stopHoldBloom() {
      clearInterval(holdBloomInterval);
      holdBloomInterval = null;
    }

    function scheduleHoldBloomRestart() {
      clearTimeout(movementStopTimeout);

      movementStopTimeout = setTimeout(() => {
        if (isPressing) {
          startHoldBloom();
        }
      }, MOVEMENT_STOP_DELAY);
    }

    function handleDocumentPointerDown(event) {
      if (
        contactMenu.classList.contains("is-open") &&
        !event.target.closest("#contact-widget")
      ) {
        closeContactMenu();
      }

      if (isPointerEffectExcluded(event)) {
        return;
      }

      isPressing = true;
      pointerX = event.clientX;
      pointerY = event.clientY;

      createBloom(pointerX, pointerY);
      startHoldBloom();
    }

    function handleDocumentPointerMove(event) {
      if (!isPressing) {
        return;
      }

      pointerX = event.clientX;
      pointerY = event.clientY;

      stopHoldBloom();
      clearTimeout(movementStopTimeout);

      createBloom(pointerX, pointerY);

      scheduleHoldBloomRestart();
    }

    function stopPointerEffect() {
      isPressing = false;

      stopHoldBloom();

      clearTimeout(movementStopTimeout);
      movementStopTimeout = null;
    }

    function initialize() {
      yearElement.textContent = new Date().getFullYear();
      typewriterElement.innerHTML = CURSOR_MARKUP;
      typewriterAccessibleElement.textContent = MESSAGES[0];

      contactButton.addEventListener("click", handleContactButtonClick);

      document.addEventListener("keydown", handleDocumentKeyDown);
      document.addEventListener("pointerdown", handleDocumentPointerDown);
      document.addEventListener("pointermove", handleDocumentPointerMove);
      document.addEventListener("pointerup", stopPointerEffect);
      document.addEventListener("pointercancel", stopPointerEffect);

      setTimeout(updateTypewriter, MESSAGE_PAUSE);
    }

    initialize();
  </script>
</body>
</html>
