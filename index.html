<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Omer Huroglu</title>
  <meta name="description" content="OmerHuroglu.com" />
  <meta name="author" content="Omer Huroglu" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://omerhuroglu.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Omer Huroglu" />
  <meta property="og:description" content="OmerHuroglu.com" />
  <meta property="og:url" content="https://omerhuroglu.com/" />
  <meta property="og:site_name" content="Omer Huroglu" />
  <meta property="og:image" content="https://omerhuroglu.com/omer-huroglu-ogimage.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Omer Huroglu" />
  <link rel="icon" type="image/x-icon" href="omer-huroglu-favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
  <noscript>
    <style>
      .information__links {
        visibility: visible;
        opacity: 1;
        transform: none;
        transition: none;
      }
      .information__link {
        opacity: 1;
        transform: none;
        transition: none;
      }
      .information__toggle {
        display: none;
      }
    </style>
  </noscript>
</head>
<body>
  <main class="site-main" aria-labelledby="site-title">
    <h1 id="site-title" class="visually-hidden">Omer Huroglu</h1>
    <p class="message" data-message-text aria-hidden="true"></p>
    <p class="visually-hidden" data-message-status aria-live="polite"></p>
  </main>
  <aside class="information" aria-label="Information menu">
    <nav
      id="information-links"
      class="information__links"
      data-information-links
      aria-label="Information links"
    >
      <a
        class="information__link"
        href="https://www.linkedin.com/in/omerhuroglu"
        target="_blank"
        rel="noopener noreferrer"
      >
        LinkedIn
      </a>
      <a
        class="information__link"
        href="https://www.facebook.com/omerhuroglu0"
        target="_blank"
        rel="noopener noreferrer"
      >
        Facebook
      </a>
      <a
        class="information__link"
        href="https://www.instagram.com/omerhuroglu"
        target="_blank"
        rel="noopener noreferrer"
      >
        Instagram
      </a>
      <a
        class="information__link"
        href="https://x.com/omerhuroglu"
        target="_blank"
        rel="noopener noreferrer"
      >
        X
      </a>
      <a
        class="information__link"
        href="https://github.com/omerhuroglu"
        target="_blank"
        rel="noopener noreferrer"
      >
        GitHub
      </a>
    </nav>
    <button
      class="information__toggle"
      data-information-toggle
      type="button"
      aria-label="Open information menu"
      aria-controls="information-links"
      aria-expanded="false"
    >
      <span aria-hidden="true">+</span>
    </button>
  </aside>
  <footer class="site-footer">
    <p class="site-footer__text">
      &copy; <span data-current-year></span> Omer Huroglu. All rights reserved.<br />
      United States
    </p>
  </footer>
</body>
</html>
