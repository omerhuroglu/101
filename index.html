<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>101</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #00ff66;
      font-family: "Courier New", Courier, monospace;
      font-size: 24px;
      padding: 24px;
      box-sizing: border-box;
      cursor: default;
      overflow: hidden;
    }

    * {
      font-family: inherit;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: none;
    }

    #mescaline {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!--
    I know why you’re here.
    I know what you’ve been doing.
    I know why you hardly sleep, why you live alone, and why night after night you sit at your computer.
    You’re looking for him.
    I know, because I was once looking for the same thing.
    And when he found me, he told me I wasn’t really looking for him.
    I was looking for an answer.
    It’s the question that drives us.
    It’s the question that brought you here.
    You know the question, just as I did.

    The answer is out there.
    It’s looking for you, and it will find you, if you want it to.
  -->

  <canvas id="rain"></canvas>
  <div id="mescaline">Searching.</div>

  <script>
    const message = document.getElementById("mescaline");
    const rain = document.getElementById("rain");
    const context = rain.getContext("2d");

    const DOT_INTERVAL = 500;
    const TYPE_INTERVAL = 120;
    const PAUSE_BEFORE_WAKE_UP = 500;
    const SEARCH_CYCLES = 3;
    const RAIN_INTERVAL = 40;
    const FONT_SIZE = 16;
    const RAIN_CHARACTERS = "アイウエオカキクケコサシスセソ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    const clickActions = [
      () => typeText("The Matrix has you..."),
      () => typeText("Follow the white rabbit."),
      () => showText("Knock, knock,"),
      () => startRain()
    ];

    let dots = 1;
    let cycles = 0;
    let isReadyForClick = false;
    let isTyping = false;
    let isRaining = false;
    let isEndingRain = false;
    let clickStep = 0;
    let columns = 0;
    let drops = [];
    let dotTimer = null;
    let rainTimer = null;

    startSearching();

    document.addEventListener("click", () => {
      if (isRaining) {
        isEndingRain = true;
        return;
      }

      if (!isReadyForClick || isTyping) return;

      const action = clickActions[clickStep];

      if (action) {
        action();
        clickStep++;
      }
    });

    window.addEventListener("resize", setupRain);

    function startSearching() {
      dots = 1;
      cycles = 0;
      clickStep = 0;
      isReadyForClick = false;
      isTyping = false;
      isEndingRain = false;
      document.body.style.cursor = "default";
      message.textContent = "Searching.";

      clearInterval(dotTimer);

      dotTimer = setInterval(() => {
        updateSearchingText();

        if (cycles === SEARCH_CYCLES) {
          clearInterval(dotTimer);

          setTimeout(() => {
            typeText("Wake up,", () => {
              isReadyForClick = true;
              document.body.style.cursor = "pointer";
            });
          }, PAUSE_BEFORE_WAKE_UP);
        }
      }, DOT_INTERVAL);
    }

    function updateSearchingText() {
      dots = dots === 3 ? 1 : dots + 1;
      message.textContent = "Searching" + ".".repeat(dots);

      if (dots === 3) {
        cycles++;
      }
    }

    function typeText(text, callback) {
      isTyping = true;
      message.textContent = "";

      let index = 0;

      const typeTimer = setInterval(() => {
        message.textContent += text[index];
        index++;

        if (index === text.length) {
          clearInterval(typeTimer);
          isTyping = false;

          if (callback) {
            callback();
          }
        }
      }, TYPE_INTERVAL);
    }

    function showText(text) {
      message.textContent = text;
    }

    function startRain() {
      isRaining = true;
      isEndingRain = false;
      message.textContent = "";
      rain.style.display = "block";
      setupRain();

      if (!rainTimer) {
        rainTimer = setInterval(drawRain, RAIN_INTERVAL);
      }
    }

    function finishRain() {
      isRaining = false;
      isEndingRain = false;
      rain.style.display = "none";

      clearInterval(rainTimer);
      rainTimer = null;

      context.clearRect(0, 0, rain.width, rain.height);
      startSearching();
    }

    function setupRain() {
      rain.width = window.innerWidth;
      rain.height = window.innerHeight;

      columns = Math.floor(rain.width / FONT_SIZE);
      drops = Array.from({ length: columns }, () => {
        return {
          y: -Math.floor(Math.random() * 20),
          active: true
        };
      });
    }

    function drawRain() {
      context.fillStyle = "rgba(0, 0, 0, 0.08)";
      context.fillRect(0, 0, rain.width, rain.height);

      context.fillStyle = "#00ff66";
      context.font = FONT_SIZE + "px Courier New";

      let activeDrops = 0;

      for (let i = 0; i < drops.length; i++) {
        const drop = drops[i];

        if (!drop.active) continue;

        activeDrops++;

        const character = RAIN_CHARACTERS[Math.floor(Math.random() * RAIN_CHARACTERS.length)];
        context.fillText(character, i * FONT_SIZE, drop.y * FONT_SIZE);

        if (drop.y * FONT_SIZE > rain.height) {
          if (isEndingRain) {
            drop.active = false;
          } else if (Math.random() > 0.975) {
            drop.y = 0;
          }
        }

        drop.y++;
      }

      if (isEndingRain && activeDrops === 0) {
        finishRain();
      }
    }
  </script>
</body>
</html>
